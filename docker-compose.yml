services:

  db:
    image: mysql:8.0
    container_name: contacts-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tp_conteneurisation
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - contacts-network

  backend:
    build: ./backend
    container_name: contacts-backend
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tp_conteneurisation
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
    networks:
      - contacts-network

  frontend:
    build: ./frontend
    container_name: contacts-frontend
    volumes:
      - frontend-dist:/frontend-dist
    networks:
      - contacts-network

  nginx:
    image: nginx:alpine
    container_name: contacts-nginx
    ports:
      - "80:80"
    volumes:
      - frontend-dist:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - contacts-network

volumes:
  db-data:
  frontend-dist:

networks:
  contacts-network:
    driver: bridge