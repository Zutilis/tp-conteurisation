services:

  db:
    image: mysql:8.0
    container_name: contacts-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tp_conteneurisation
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - contacts-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    container_name: contacts-backend
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tp_conteneurisation
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    networks:
      - contacts-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 3s
      timeout: 2s
      retries: 20
      start_period: 5s

  frontend:
    build: ./frontend
    container_name: contacts-frontend
    volumes:
      - frontend-dist:/frontend-dist
    networks:
      - contacts-network

  nginx:
    image: nginx:alpine
    container_name: contacts-nginx
    ports:
      - "80:80"
    volumes:
      - frontend-dist:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_completed_successfully
    networks:
      - contacts-network

volumes:
  db-data:
  frontend-dist:

networks:
  contacts-network:
    driver: bridge